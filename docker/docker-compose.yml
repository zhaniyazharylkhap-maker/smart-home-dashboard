services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-smarthome}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smarthome}
      POSTGRES_DB: ${POSTGRES_DB:-smarthome}
    # Host port defaults to 5433 so it does not clash with a local Postgres on 5432.
    # Override in .env: POSTGRES_PORT=5432
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smarthome} -d ${POSTGRES_DB:-smarthome}"]
      interval: 5s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-smarthome}:${POSTGRES_PASSWORD:-smarthome}@postgres:5432/${POSTGRES_DB:-smarthome}
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_TELEMETRY_TOPIC: smarthome/telemetry
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-string}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      mqtt:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        # Browser on host talks to API at host:8000 (published below). Baked into client JS.
        NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
        NEXT_PUBLIC_WS_URL: ""
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      NEXT_PUBLIC_WS_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      - backend

  simulator:
    build:
      context: ../simulator
      dockerfile: Dockerfile
    environment:
      MQTT_HOST: mqtt
      MQTT_PORT: "1883"
      MQTT_TOPIC: smarthome/telemetry
      INTERVAL_SEC: "3"
    depends_on:
      - mqtt

volumes:
  postgres_data:
  mqtt_data:
  mqtt_log:
